<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaSpace | Virtual Workspace</title>
    <meta name="description" content="MetaSpace — a real-time 3D virtual workspace with human-like avatars and spatial collaboration">
    <!-- Modern Typography: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Three.js (Import map for ES modules) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body data-theme="dark">

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Floating Hamburger -->
        <button id="hamburger-btn" class="hamburger-btn floating-hamburger slide-down" aria-label="Toggle menu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <!-- Slide-out Nav Drawer -->
        <nav id="nav-drawer" class="nav-drawer glass-panel">
            <div class="drawer-header">
                <h1 class="logo">Meta<span class="accent">Space</span></h1>
                <button id="close-drawer-btn" class="icon-btn-small close-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="drawer-user-card">
                <div class="drawer-user-status">
                    <div class="status-indicator online" id="drawer-status"></div>
                    <span id="drawer-username">Connecting...</span>
                </div>
                <button id="edit-profile-btn" class="drawer-menu-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    <span>Edit Profile</span>
                </button>
            </div>
            <div class="drawer-controls-info">
                <p><strong>WASD</strong> or <strong>Arrows</strong> to move</p>
                <p><strong>Mouse</strong> to orbit view</p>
            </div>
        </nav>
        <div id="drawer-backdrop" class="drawer-backdrop"></div>

        <!-- Connection Overlay -->
        <div id="connection-overlay" class="overlay-modal fade-in">
            <!-- Loader (shows first) -->
            <div class="modal-content glass-panel glow" id="loader-content">
                <h2>Welcome to MetaSpace</h2>
                <p>Establishing spatial link...</p>
                <div class="loader"></div>
            </div>

            <!-- Initial Setup (shows after connection) -->
            <div class="modal-content profile-content glass-panel glow" id="initial-setup-content" style="display: none;">
                <div class="modal-header">
                    <h2>Choose Your Identity</h2>
                </div>
                
                <div class="form-group">
                    <label for="setup-name">Display Name</label>
                    <input type="text" id="setup-name" class="styled-input" maxlength="20" placeholder="Enter your name...">
                </div>

                <div class="form-group">
                    <label>Avatar Type</label>
                    <div class="radio-group" id="setup-gender-selector">
                        <div class="radio-card active" data-value="male">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span>Alpha Base</span>
                        </div>
                        <div class="radio-card" data-value="female">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle><path d="M9 11s0 5-3 8"></path><path d="M15 11s0 5 3 8"></path></svg>
                            <span>Beta Flow</span>
                        </div>
                    </div>
                </div>

                <button id="join-workspace-btn" class="glow-btn full-width">Enter Workspace</button>
            </div>
        </div>

        <!-- Profile Edit Modal -->
        <div id="profile-modal" class="overlay-modal hidden fade-in">
            <div class="modal-content profile-content glass-panel glow">
                <div class="modal-header">
                    <h2>Avatar Settings</h2>
                    <button id="close-profile-btn" class="icon-btn-small close-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="form-group">
                    <label for="profile-name">Display Name</label>
                    <input type="text" id="profile-name" class="styled-input" maxlength="20">
                </div>

                <div class="form-group">
                    <label>Avatar Type</label>
                    <div class="radio-group" id="gender-selector">
                        <div class="radio-card active" data-value="male">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span>Alpha Base</span>
                        </div>
                        <div class="radio-card" data-value="female">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle><path d="M9 11s0 5-3 8"></path><path d="M15 11s0 5 3 8"></path></svg>
                            <span>Beta Flow</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Accent Color</label>
                    <div class="color-picker-grid" id="color-picker-grid">
                        <div class="color-swatch" data-color="#2563eb" style="background-color: #2563eb;"></div>
                        <div class="color-swatch" data-color="#0891b2" style="background-color: #0891b2;"></div>
                        <div class="color-swatch" data-color="#059669" style="background-color: #059669;"></div>
                        <div class="color-swatch" data-color="#4f46e5" style="background-color: #4f46e5;"></div>
                        <div class="color-swatch" data-color="#7c3aed" style="background-color: #7c3aed;"></div>
                        <div class="color-swatch" data-color="#e11d48" style="background-color: #e11d48;"></div>
                        <div class="color-swatch" data-color="#db2777" style="background-color: #db2777;"></div>
                        <div class="color-swatch" data-color="#c026d3" style="background-color: #c026d3;"></div>
                        <div class="color-swatch" data-color="#f59e0b" style="background-color: #f59e0b;"></div>
                        <div class="color-swatch active" data-color="#ff2a5f" style="background-color: #ff2a5f;"></div>
                    </div>
                </div>

                <button id="save-profile-btn" class="glow-btn full-width">Apply Changes</button>
            </div>
        </div>

        <!-- Chat Panel -->
        <aside class="chat-panel glass-panel slide-right collapsed" id="chat-panel">
            <div class="chat-header" id="chat-header-toggle">
                <h3>Workspace Chat</h3>
                <button id="chat-collapse-btn" class="icon-btn-small chat-toggle-btn" title="Collapse chat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will appear here -->
                </div>
                <div class="chat-input-wrapper">
                    <!-- File upload button -->
                    <button id="file-upload-btn" class="icon-btn" title="Attach file (max 5MB)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="file-input" class="hidden-file-input" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.csv,.xlsx">
                    <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                    <button id="send-btn" class="glow-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <!-- Upload progress bar -->
                <div id="upload-progress" class="upload-progress hidden">
                    <div class="upload-progress-bar" id="upload-progress-bar"></div>
                    <span class="upload-progress-text" id="upload-progress-text">Uploading...</span>
                </div>
            </div>
        </aside>

        <!-- Controls Hint (hidden now — moved to drawer) -->

        <!-- Inventory Hotbar UI -->
        <div class="inventory-hotbar" id="inventory-hotbar">
            <div class="hotbar-slot" id="slot-axe">
                <span class="slot-qty" id="qty-axe"></span>
                <div class="slot-icon" id="icon-axe">❓</div>
            </div>
            <div class="hotbar-slot selected" id="slot-wood">
                <span class="slot-qty" id="qty-wood">0</span>
                <div class="slot-icon" id="icon-wood">🪵</div>
            </div>
            <div class="hotbar-hint">Right-click to interact!</div>
        </div>

    </div>

    <!-- App Logic -->
    <script type="module" src="app.js"></script>

</body>
</html>
